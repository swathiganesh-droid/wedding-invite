<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

:root{
--primary:#c8a2ff; /* lilac wax seal */
--paper:#fdfaf6;
--envelope:#f3ece4;
--accent:#b388ff;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#eee6f7;
font-family:'Playfair Display',serif;
overflow:hidden;
}

/* petals */

.petal{
position:fixed;
top:-20px;
width:14px;
height:20px;
background:#e6ccff;
border-radius:70% 30% 70% 30%;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-20px) rotate(0)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* envelope */

.envelope-wrapper{
position:relative;
width:320px;
height:210px;
background:var(--envelope);
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:transform .6s ease;
}

.envelope-wrapper::before{
content:"";
position:absolute;
top:0;
z-index:2;
border-left:160px solid transparent;
border-right:160px solid transparent;
border-top:115px solid var(--envelope);
transform-origin:top;
transition:transform .5s .3s ease;
}

/* wax seal */

.wax-seal{
position:absolute;
top:95px;
left:50%;
transform:translateX(-50%);
width:56px;
height:56px;
background:var(--primary);
border-radius:50%;
z-index:3;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
font-family:'Dancing Script',cursive;
box-shadow:0 3px 6px rgba(0,0,0,0.3);
transition:opacity .3s;
}

.wax-seal::after{
content:"A&S";
}

/* invitation card */

.card{
position:absolute;
bottom:0;
left:10px;
width:300px;
height:190px;
background:var(--paper);
padding:20px;
text-align:center;
transition:transform .6s .6s ease;
z-index:1;
display:flex;
flex-direction:column;
justify-content:center;
}

.card h1{
font-family:'Dancing Script',cursive;
font-size:30px;
margin:0;
color:#8e6cc3;
}

.names{
font-size:22px;
margin:8px 0;
}

.reveal{
opacity:0;
transition:opacity 1s;
}

.envelope-wrapper.open .reveal{
opacity:1;
}

.envelope-wrapper.open::before{
transform:rotateX(180deg);
}

.envelope-wrapper.open .wax-seal{
opacity:0;
}

.envelope-wrapper.open .card{
transform:translateY(-130px);
height:380px;
}

/* countdown */

.countdown{
margin-top:10px;
font-size:14px;
}

/* button */

.btn{
display:inline-block;
margin-top:10px;
padding:10px 18px;
background:#b388ff;
color:white;
border-radius:20px;
text-decoration:none;
font-size:14px;
}

</style>
</head>

<body>

<div class="envelope-wrapper" onclick="openInvitation()">

<div class="wax-seal"></div>

<div class="card">

<h1>Save the Date</h1>

<p>Together with their families</p>

<div class="names"><strong>Arnesh & Swathi</strong></div>

<div class="reveal">

<p>Request the honour of your presence</p>

<p>
<strong>September 11, 2026</strong><br>
Swissbel Hotel Harbour Bay Batam<br>
6:00 PM
</p>

<div class="countdown" id="countdown"></div>

<a class="btn" href="#">RSVP</a>

</div>

</div>
</div>

<script>

function openInvitation(){
document.querySelector(".envelope-wrapper").classList.add("open");
}

const weddingDate = new Date("2026-09-11T18:00:00");

function updateCountdown(){

const now = new Date();
const diff = weddingDate - now;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/(1000*60))%60);

document.getElementById("countdown").innerHTML =
days+" days "+hours+" hours "+minutes+" minutes until our wedding";

}

updateCountdown();
setInterval(updateCountdown,60000);

</script>

</body>
</html>
