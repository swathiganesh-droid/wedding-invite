<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arnesh & Swathi</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --seal:#c7a6ff;
      --seal-dark:#a97ff0;
      --lilac:#eee3ff;
      --lilac-2:#e4d2ff;
      --paper:#fffaf6;
      --envelope:#f5efe8;
      --text:#5f4b66;
      --gold:#d8b65c;
      --shadow:0 14px 40px rgba(84, 58, 102, 0.16);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top, #f7f1ff 0%, #eee5fb 40%, #eadff7 100%);
      font-family:'Playfair Display', serif;
      overflow:hidden;
      color:var(--text);
      padding:20px;
    }

    .bg-glow{
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.55), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,.35), transparent 22%),
        radial-gradient(circle at 50% 85%, rgba(255,255,255,.28), transparent 26%);
      z-index:0;
    }

    .petals, .sparkles{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:1;
    }

    .petal{
      position:absolute;
      top:-40px;
      width:16px;
      height:24px;
      background:linear-gradient(180deg, #f5ecff, #dcbfff);
      border-radius:70% 30% 70% 30%;
      opacity:.9;
      box-shadow:inset -2px -2px 4px rgba(255,255,255,.4);
      animation:fall linear infinite;
    }

    .petal:nth-child(2n){
      background:linear-gradient(180deg, #efe4ff, #cfa8ff);
    }

    .petal:nth-child(3n){
      background:linear-gradient(180deg, #faf4ff, #e2c8ff);
    }

    @keyframes fall{
      0%{
        transform:translateY(-50px) translateX(0) rotate(0deg);
        opacity:.95;
      }
      100%{
        transform:translateY(110vh) translateX(90px) rotate(360deg);
        opacity:.18;
      }
    }

    .sparkle{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:50%;
      background:rgba(216,182,92,.95);
      box-shadow:0 0 12px rgba(216,182,92,.9);
      animation:twinkle ease-in-out infinite;
    }

    @keyframes twinkle{
      0%,100%{transform:scale(.5); opacity:.25;}
      50%{transform:scale(1.4); opacity:1;}
    }

    .wrap{
      position:relative;
      z-index:2;
      text-align:center;
    }

    .hint{
      margin-top:18px;
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#7f6992;
    }

    .envelope{
      position:relative;
      width:340px;
      height:220px;
      background:linear-gradient(180deg, #f7f1eb, var(--envelope));
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:transform .7s ease;
      border-radius:4px;
      overflow:visible;
      margin:0 auto;
    }

    .envelope::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      z-index:3;
      border-left:170px solid transparent;
      border-right:170px solid transparent;
      border-top:120px solid var(--envelope);
      transform-origin:top;
      transition:transform .6s .2s ease;
      filter:drop-shadow(0 3px 2px rgba(0,0,0,.04));
    }

    .envelope::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, transparent 49.7%, rgba(120,100,140,.06) 50%, transparent 50.3%),
        linear-gradient(225deg, transparent 49.7%, rgba(120,100,140,.06) 50%, transparent 50.3%);
      pointer-events:none;
      z-index:1;
    }

    .seal{
      position:absolute;
      left:50%;
      top:98px;
      transform:translateX(-50%);
      width:62px;
      height:62px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #dcc6ff, var(--seal-dark));
      box-shadow:
        0 5px 12px rgba(0,0,0,.22),
        inset 0 2px 4px rgba(255,255,255,.35);
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:opacity .3s ease, transform .3s ease;
    }

    .seal::after{
      content:"A&S";
      font-family:'Dancing Script', cursive;
      font-size:28px;
      color:#fff7ff;
      text-shadow:0 1px 1px rgba(0,0,0,.15);
    }

    .card{
      position:absolute;
      left:12px;
      bottom:0;
      width:316px;
      height:195px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,250,246,.98)),
        var(--paper);
      box-shadow:0 2px 12px rgba(0,0,0,.06);
      z-index:2;
      padding:22px 22px 18px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      transition:transform .8s .55s ease, height .8s .55s ease;
      overflow:hidden;
    }

    .top-ornament{
      width:70px;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-family:'Dancing Script', cursive;
      font-size:34px;
      line-height:1;
      color:#9b77d8;
    }

    .sub{
      margin:10px 0 6px;
      font-size:14px;
    }

    .names{
      font-size:25px;
      font-weight:600;
      color:#7f5fba;
      margin:4px 0;
    }

    .reveal{
      opacity:0;
      transition:opacity .7s 1.05s ease;
      margin-top:6px;
      width:100%;
    }

    .line{
      width:64px;
      height:1px;
      background:linear-gradient(90deg, transparent, var(--gold), transparent);
      margin:10px auto 12px;
    }

    .details{
      font-size:15px;
      line-height:1.7;
    }

    .countdown{
      margin:14px auto 0;
      width:100%;
      max-width:250px;
      border:1px solid rgba(169,127,240,.18);
      border-radius:14px;
      padding:10px 12px;
      background:rgba(255,255,255,.55);
      font-size:13px;
      line-height:1.5;
    }

    .buttons{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
      margin-top:14px;
    }

    .btn{
      display:inline-block;
      min-width:180px;
      text-decoration:none;
      padding:11px 18px;
      border-radius:999px;
      font-size:14px;
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }

    .btn-primary{
      background:linear-gradient(180deg, #cbaaff, #b78ef8);
      color:white;
    }

    .btn-secondary{
      background:rgba(255,255,255,.7);
      color:#8964c8;
      border:1px solid rgba(169,127,240,.35);
    }

    .envelope.open::before{
      transform:rotateX(180deg);
      z-index:0;
    }

    .envelope.open .seal{
      opacity:0;
      pointer-events:none;
      transform:translateX(-50%) scale(.88);
    }

    .envelope.open .card{
      transform:translateY(-138px);
      height:430px;
    }

    .envelope.open{
      transform:translateY(62px);
    }

    .envelope.open .reveal{
      opacity:1;
    }

    @media (max-width:420px){
      .envelope{
        width:310px;
        height:205px;
      }

      .envelope::before{
        border-left:155px solid transparent;
        border-right:155px solid transparent;
        border-top:112px solid var(--envelope);
      }

      .card{
        width:286px;
        height:184px;
      }

      .envelope.open .card{
        height:446px;
      }

      h1{font-size:31px}
      .names{font-size:23px}
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="petals">
    <span class="petal" style="left:4%;animation-duration:11s;animation-delay:0s;"></span>
    <span class="petal" style="left:14%;animation-duration:13s;animation-delay:1s;"></span>
    <span class="petal" style="left:25%;animation-duration:12s;animation-delay:4s;"></span>
    <span class="petal" style="left:37%;animation-duration:15s;animation-delay:2s;"></span>
    <span class="petal" style="left:49%;animation-duration:10s;animation-delay:3s;"></span>
    <span class="petal" style="left:61%;animation-duration:14s;animation-delay:1.5s;"></span>
    <span class="petal" style="left:73%;animation-duration:11s;animation-delay:5s;"></span>
    <span class="petal" style="left:84%;animation-duration:16s;animation-delay:2.5s;"></span>
    <span class="petal" style="left:94%;animation-duration:12s;animation-delay:.5s;"></span>
  </div>

  <div class="sparkles">
    <span class="sparkle" style="top:12%;left:18%;animation-duration:2.3s;"></span>
    <span class="sparkle" style="top:22%;left:78%;animation-duration:1.8s;"></span>
    <span class="sparkle" style="top:34%;left:8%;animation-duration:2.7s;"></span>
    <span class="sparkle" style="top:44%;left:88%;animation-duration:2.1s;"></span>
    <span class="sparkle" style="top:58%;left:14%;animation-duration:1.9s;"></span>
    <span class="sparkle" style="top:68%;left:82%;animation-duration:2.5s;"></span>
    <span class="sparkle" style="top:80%;left:28%;animation-duration:2.2s;"></span>
    <span class="sparkle" style="top:14%;left:56%;animation-duration:2.8s;"></span>
  </div>

  <div class="wrap">
    <div class="envelope" onclick="openInvitation()">
      <div class="seal"></div>

      <div class="card">
        <div class="top-ornament"></div>
        <h1>Save the Date</h1>
        <div class="sub">Together with their families</div>
        <div class="names">Arnesh &amp; Swathi</div>

        <div class="reveal">
          <div>request the honour of your presence</div>
          <div class="line"></div>

          <div class="details">
            <strong>September 11, 2026</strong><br>
            Swissbel Hotel Harbour Bay Batam<br>
            6:00 PM
          </div>

          <div class="countdown" id="countdown">Counting down...</div>

          <div class="buttons">
            <a class="btn btn-primary" href="#" target="_blank" rel="noopener noreferrer">RSVP</a>
            <a class="btn btn-secondary" href="https://maps.google.com/?q=Swissbel+Hotel+Harbour+Bay+Batam" target="_blank" rel="noopener noreferrer">View Location</a>
          </div>
        </div>
      </div>
    </div>

    <div class="hint">Tap the envelope to open</div>
  </div>

  <script>
    let opened = false;

    function openInvitation(){
      if(opened) return;
      document.querySelector('.envelope').classList.add('open');
      opened = true;
    }

    function updateCountdown(){
      const weddingDate = new Date("2026-09-11T18:00:00");
      const now = new Date();
      const diff = weddingDate - now;
      const el = document.getElementById("countdown");

      if(diff <= 0){
        el.innerHTML = "Today is the day 💍";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);

      el.innerHTML = "<strong>" + days + "</strong> days, <strong>" + hours + "</strong> hours, <strong>" + minutes + "</strong> minutes until our wedding";
    }

    updateCountdown();
    setInterval(updateCountdown, 60000);
  </script>
</body>
</html>
